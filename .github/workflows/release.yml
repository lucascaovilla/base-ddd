name: Release

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag to promote (ex: v0.0.9-rc.5)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --tags

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Store RC tag
        run: |
          TAG="${{ github.event.inputs.rc_tag }}"
          if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "Invalid RC tag format"
            exit 1
          fi
          echo "RC_TAG=$TAG" >> $GITHUB_ENV

      - name: Read current version
        run: |
          CURRENT=$(dotnet msbuild src/BaseDDD.Cli/BaseDDD.Cli.csproj -nologo -v:q -getProperty:Version)
          BASE=$(echo $CURRENT | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "CURRENT=$CURRENT" >> $GITHUB_ENV
          echo "BASE=$BASE" >> $GITHUB_ENV

      - name: Validate RC
        run: |
          if [[ "${{ env.RC_TAG }}" != v"${{ env.BASE }}"-rc.* ]]; then
            echo "RC tag does not match current base version ${{ env.BASE }}"
            exit 1
          fi

      - name: Compute next version
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ env.BASE }}"
          NEXT="$MAJOR.$MINOR.$((PATCH+1))"
          echo "VERSION=$NEXT" >> $GITHUB_ENV
          echo "Next version: $NEXT"

      - name: Update version in csproj
        run: |
          sed -i -E "s#<Version>.*</Version>#<Version>${{ env.VERSION }}</Version>#g" src/BaseDDD.Cli/BaseDDD.Cli.csproj

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add src/BaseDDD.Cli/BaseDDD.Cli.csproj
          git commit -m "chore: bump version to ${{ env.VERSION }}"
          git push origin main --force

      - name: Create tag
        run: |
          if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag already exists!"
            exit 1
          fi
          git tag v${{ env.VERSION }}
          git push origin v${{ env.VERSION }}

      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: "v${{ env.VERSION }}"
            });
            core.setOutput("notes", response.data.body);

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: ${{ steps.notes.outputs.notes }}

      - run: dotnet restore
      - run: dotnet build -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack \
            -c Release \
            -p:PackageVersion=${{ env.VERSION }} \
            --no-build \
            -o ./nupkg

      - name: Publish
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json

      - name: Trigger documentation
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "docfx.yml",
              ref: "v${{ env.VERSION }}"
            });
