name: Release

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag to release (ex: v0.0.8-rc.1)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout RC tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.rc_tag }}
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Validate RC tag
        run: |
          TAG="${{ github.event.inputs.rc_tag }}"

          if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "Invalid RC tag format"
            exit 1
          fi

          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Extract release version
        run: |
          TAG="${{ env.TAG }}"

          BASE=$(echo $TAG | sed -E 's/v([0-9]+\.[0-9]+\.[0-9]+)-rc\.[0-9]+/\1/')

          echo "VERSION=$BASE" >> $GITHUB_ENV
          echo "Release version: $BASE"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack \
            -c Release \
            -p:PackageVersion=${{ env.VERSION }} \
            --no-build \
            -o ./nupkg

      - name: Publish to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --skip-duplicate \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json

      - name: Create release tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Release tag already exists"
            exit 1
          fi

          git tag v${{ env.VERSION }}
          git push origin v${{ env.VERSION }}

      - name: Generate Release Notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: "v${{ env.VERSION }}"
            });

            core.setOutput("notes", response.data.body);

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: ${{ steps.notes.outputs.notes }}

      - name: Compute next version
        run: |
          VERSION=${{ env.VERSION }}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_PATCH=$((PATCH+1))
          NEXT="$MAJOR.$MINOR.$NEXT_PATCH"

          sed -i -E "s#<VersionPrefix>.*</VersionPrefix>#<VersionPrefix>$NEXT</VersionPrefix>#g" Directory.Build.props

          echo "NEXT=$NEXT" >> $GITHUB_ENV

      - name: Create version bump PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/bump-version-${{ env.NEXT }}
          commit-message: "chore: bump version to ${{ env.NEXT }}"
          title: "chore: bump version to ${{ env.NEXT }}"
          body: "Automatic version bump after release."
