name: Release

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag to promote (e.g. v0.0.9-rc.2)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --tags

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Validate and parse RC tag
        run: |
          TAG="${{ github.event.inputs.rc_tag }}"
          if [[ ! "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-rc\.[0-9]+$ ]]; then
            echo "Invalid RC tag: $TAG"
            exit 1
          fi
          BASE="${BASH_REMATCH[1]}"
          CURRENT=$(dotnet msbuild src/BaseDDD.Cli/BaseDDD.Cli.csproj -nologo -v:q -getProperty:Version \
            | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          if [[ "$BASE" != "$CURRENT" ]]; then
            echo "RC tag base $BASE does not match csproj version $CURRENT"
            exit 1
          fi
          IFS='.' read -r MAJ MIN PAT <<< "$BASE"
          echo "VERSION=$MAJ.$MIN.$((PAT + 1))" >> $GITHUB_ENV

      - run: dotnet restore
      - run: dotnet build -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack -c Release \
            -p:PackageVersion=${{ env.VERSION }} \
            --no-build \
            -o ./nupkg

      - name: Bump version in csproj and tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          sed -i -E "s#<Version>[^<]*</Version>#<Version>${{ env.VERSION }}</Version>#g" \
            src/BaseDDD.Cli/BaseDDD.Cli.csproj
          git add src/BaseDDD.Cli/BaseDDD.Cli.csproj
          git commit -m "chore: bump version to ${{ env.VERSION }}"
          git push origin main
          git tag v${{ env.VERSION }}
          git push origin v${{ env.VERSION }}

      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: "v${{ env.VERSION }}"
            });
            core.setOutput("notes", data.body);

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: ${{ steps.notes.outputs.notes }}

      - name: Publish to nuget.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json

      - name: Trigger docs
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "docfx.yml",
              ref: "v${{ env.VERSION }}"
            });
