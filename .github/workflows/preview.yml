name: Preview Package

on:
  push:
    branches:
      - main

jobs:
  preview:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --tags

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Read base version
        run: |
          BASE=$(dotnet msbuild src/BaseDDD.Cli/BaseDDD.Cli.csproj -nologo -v:q -getProperty:Version \
            | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "BASE=$BASE" >> $GITHUB_ENV

      - name: Compute preview version
        run: |
          COUNT=$(git tag -l "v${BASE}-preview.*" | wc -l | tr -d ' ')
          NEXT=$((COUNT + 1))
          echo "VERSION=${BASE}-preview.${NEXT}" >> $GITHUB_ENV

      - name: Bump version in csproj
        run: |
          sed -i -E "s#<Version>[^<]*</Version>#<Version>${{ env.VERSION }}</Version>#g" \
            src/BaseDDD.Cli/BaseDDD.Cli.csproj

      - run: dotnet restore
      - run: dotnet build -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack -c Release \
            -p:PackageVersion=${{ env.VERSION }} \
            --no-build \
            -o ./nupkg

      - name: Commit and tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add src/BaseDDD.Cli/BaseDDD.Cli.csproj
          git commit -m "chore: bump version to ${{ env.VERSION }}"
          git pull --rebase origin main
          git push origin main
          git tag v${{ env.VERSION }}
          git push origin v${{ env.VERSION }}

      - name: Publish
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --skip-duplicate \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
