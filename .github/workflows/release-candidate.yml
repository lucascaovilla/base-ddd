name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      preview_tag:
        description: "Preview tag to promote (ex: v0.0.7-preview.15)"
        required: true

jobs:
  rc:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout preview tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.preview_tag }}
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Validate preview tag
        run: |
          TAG="${{ github.event.inputs.preview_tag }}"

          if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+-preview\.[0-9]+$ ]]; then
            echo "Invalid preview tag format"
            exit 1
          fi

          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine RC version
        run: |
          TAG="${{ env.TAG }}"

          BASE=$(echo $TAG | sed -E 's/v([0-9]+\.[0-9]+\.[0-9]+)-preview\.[0-9]+/\1/')

          COUNT=$(git tag -l "v$BASE-rc.*" | wc -l)
          RC=$((COUNT+1))

          VERSION="$BASE-rc.$RC"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RC version: $VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack \
            -c Release \
            -p:PackageVersion=${{ env.VERSION }} \
            --no-build \
            -o ./nupkg

      - name: Publish RC to GitHub Packages
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --skip-duplicate \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

      - name: Create RC tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag already exists"
            exit 1
          fi

          git tag v${{ env.VERSION }}
          git push origin v${{ env.VERSION }}
