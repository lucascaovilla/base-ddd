name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      preview_tag:
        description: "Preview tag to promote (ex: v0.0.9-preview.3)"
        required: true

jobs:
  rc:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.preview_tag }}
          fetch-depth: 0

      - run: git fetch --tags

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Read current version
        run: |
          CURRENT=$(dotnet msbuild src/BaseDDD.Cli/BaseDDD.Cli.csproj -nologo -v:q -getProperty:Version)
          BASE=$(echo $CURRENT | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "BASE=$BASE" >> $GITHUB_ENV

      - name: Compute RC version
        run: |
          COUNT=$(git tag -l "v${BASE}-rc.*" | wc -l)
          NEXT=$((COUNT+1))
          VERSION="${BASE}-rc.${NEXT}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RC version: $VERSION"

      - name: Update version in csproj
        run: |
          sed -i -E "s#<Version>.*</Version>#<Version>${{ env.VERSION }}</Version>#g" src/BaseDDD.Cli/BaseDDD.Cli.csproj

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add src/BaseDDD.Cli/BaseDDD.Cli.csproj
          git commit -m "chore: bump version to ${{ env.VERSION }}"
          git push origin main --force

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack \
            -c Release \
            -p:PackageVersion=${{ env.VERSION }} \
            --no-build \
            -o ./nupkg

      - name: Create RC tag
        run: |
          if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag already exists"
            exit 1
          fi
          git tag v${{ env.VERSION }}
          git push origin v${{ env.VERSION }}

      - name: Publish RC
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --skip-duplicate \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

      - name: Trigger documentation
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "docfx.yml",
              ref: "v${{ env.VERSION }}"
            });
