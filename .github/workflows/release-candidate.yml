name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      preview_tag:
        description: "Preview tag to promote (e.g. v0.0.9-preview.3)"
        required: true

jobs:
  version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.compute.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - run: git fetch --tags

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Validate preview tag exists
        run: |
          TAG="${{ github.event.inputs.preview_tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG does not exist"
            exit 1
          fi

      - name: Compute RC version
        id: compute
        run: |
          BASE=$(dotnet msbuild src/BaseDDD.Cli/BaseDDD.Cli.csproj -nologo -v:q -getProperty:Version \
            | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          COUNT=$(git tag -l "v${BASE}-rc.*" | wc -l | tr -d ' ')
          NEXT=$((COUNT + 1))
          echo "version=${BASE}-rc.${NEXT}" >> $GITHUB_OUTPUT

  build:
    needs: version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.version.outputs.version }}
    secrets: inherit

  docs:
    needs: build
    uses: ./.github/workflows/docfx.yml
    secrets: inherit
