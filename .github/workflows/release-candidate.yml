name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      preview_tag:
        description: "Preview tag to promote (e.g. v0.0.9-preview.3)"
        required: true

jobs:
  rc:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - run: git fetch --tags

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Validate preview tag exists
        run: |
          TAG="${{ github.event.inputs.preview_tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG does not exist"
            exit 1
          fi
          echo "PREVIEW_TAG=$TAG" >> $GITHUB_ENV

      - name: Read base version
        run: |
          BASE=$(dotnet msbuild src/BaseDDD.Cli/BaseDDD.Cli.csproj -nologo -v:q -getProperty:Version \
            | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "BASE=$BASE" >> $GITHUB_ENV

      - name: Compute RC version
        run: |
          COUNT=$(git tag -l "v${BASE}-rc.*" | wc -l | tr -d ' ')
          NEXT=$((COUNT + 1))
          echo "VERSION=${BASE}-rc.${NEXT}" >> $GITHUB_ENV

      - name: Bump version in csproj
        run: |
          sed -i -E "s#<Version>[^<]*</Version>#<Version>${{ env.VERSION }}</Version>#g" \
            src/BaseDDD.Cli/BaseDDD.Cli.csproj

      - run: dotnet restore
      - run: dotnet build -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack -c Release \
            -p:PackageVersion=${{ env.VERSION }} \
            --no-build \
            -o ./nupkg

      - name: Commit and tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add src/BaseDDD.Cli/BaseDDD.Cli.csproj
          git commit -m "chore: bump version to ${{ env.VERSION }}"
          git pull --rebase origin main
          git push origin main
          git tag v${{ env.VERSION }}
          git push origin v${{ env.VERSION }}

      - name: Publish
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --skip-duplicate \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

      - name: Trigger docs
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "docfx.yml",
              ref: "v${{ env.VERSION }}"
            });
