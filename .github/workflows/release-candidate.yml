name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      preview_tag:
        description: "Preview tag to promote"
        required: true

jobs:
  rc:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.preview_tag }}
          fetch-depth: 0

      - run: git fetch --tags

      - name: Extract version
        run: |
          TAG=${{ github.event.inputs.preview_tag }}

          BASE=$(echo $TAG | sed -E 's/v([0-9]+\.[0-9]+\.[0-9]+)-preview\.[0-9]+/\1/')

          COUNT=$(git tag -l "v$BASE-rc.*" | wc -l)
          NEXT=$((COUNT+1))

          VERSION="$BASE-rc.$NEXT"

          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: dotnet restore
      - run: dotnet build -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack \
            -c Release \
            -p:PackageVersion=${VERSION} \
            --no-build \
            -o ./nupkg

      - name: Publish RC
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --skip-duplicate \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

      - name: Create RC tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag v${VERSION}
          git push origin v${VERSION}
