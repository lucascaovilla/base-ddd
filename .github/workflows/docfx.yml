name: Documentation

on:
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --tags

      - name: Configure git identity
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Resolve slot
        run: |
          REF="${GITHUB_REF}"

          if [[ "$REF" == refs/tags/* ]]; then
            TAG="${REF#refs/tags/}"

            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "SLOT=$TAG" >> $GITHUB_ENV
              echo "IS_RELEASE=true" >> $GITHUB_ENV

            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
              echo "SLOT=rc" >> $GITHUB_ENV
              echo "IS_RELEASE=false" >> $GITHUB_ENV

            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-preview\.[0-9]+$ ]]; then
              echo "SLOT=preview" >> $GITHUB_ENV
              echo "IS_RELEASE=false" >> $GITHUB_ENV

            else
              echo "Unknown tag format, skipping docs"
              exit 0
            fi

          else
            echo "SLOT=preview" >> $GITHUB_ENV
            echo "IS_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Build XML docs
        run: dotnet build src/BaseDDD.Cli/BaseDDD.Cli.csproj -c Release /p:GenerateDocumentationFile=true

      - name: Build DocFX site
        run: docfx docs/docfx.json

      - name: Initialize gh-pages if missing
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "chore: initialize gh-pages branch"
            git push origin gh-pages
            git checkout main
          fi

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to slot
        run: |
          SLOT="${{ env.SLOT }}"
          DEST="gh-pages/$SLOT"

          if [[ "${{ env.IS_RELEASE }}" == "true" && -d "$DEST" ]]; then
            echo "Release docs for $SLOT already exist — skipping overwrite."
            exit 0
          fi

          rm -rf "$DEST"
          mkdir -p "$DEST"
          cp -r docs/_site/. "$DEST/"

      - name: Update versions manifest
        run: |
          MANIFEST="gh-pages/versions.json"

          if [[ ! -f "$MANIFEST" ]]; then
            echo "[]" > "$MANIFEST"
          fi

          if [[ "${{ env.IS_RELEASE }}" == "true" ]]; then
            SLOT="${{ env.SLOT }}"
            node -e "
              const fs = require('fs');
              const manifest = '$MANIFEST';
              const versions = JSON.parse(fs.readFileSync(manifest, 'utf8'));
              if (!versions.includes('$SLOT')) {
                versions.unshift('$SLOT');
                fs.writeFileSync(manifest, JSON.stringify(versions, null, 2));
              }
            "
          fi

      - name: Commit and push gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "docs: deploy ${{ env.SLOT }}"
          git push origin gh-pages
