name: Documentation

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --tags

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Resolve slot
        run: |
          REF="${GITHUB_REF}"

          if [[ "$REF" == refs/tags/* ]]; then
            TAG="${REF#refs/tags/}"

            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "SLOT=$TAG" >> $GITHUB_ENV
              echo "IS_RELEASE=true" >> $GITHUB_ENV

            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
              echo "SLOT=rc" >> $GITHUB_ENV
              echo "IS_RELEASE=false" >> $GITHUB_ENV

            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-preview\.[0-9]+$ ]]; then
              echo "SLOT=preview" >> $GITHUB_ENV
              echo "IS_RELEASE=false" >> $GITHUB_ENV

            else
              echo "Unknown tag format, skipping docs"
              exit 0
            fi

          else
            echo "SLOT=preview" >> $GITHUB_ENV
            echo "IS_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Build XML docs
        run: dotnet build src/BaseDDD.Cli/BaseDDD.Cli.csproj -c Release /p:GenerateDocumentationFile=true

      - name: Build DocFX site
        run: docfx docs/docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
