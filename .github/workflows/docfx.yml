name: Documentation

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --tags

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Resolve slot
        run: |
          REF="${GITHUB_REF}"
          if [[ "$REF" =~ ^refs/tags/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "SLOT=v${BASH_REMATCH[1]}" >> $GITHUB_ENV
            echo "IS_RELEASE=true" >> $GITHUB_ENV
          elif [[ "$REF" =~ ^refs/tags/.*-rc\. ]]; then
            echo "SLOT=rc" >> $GITHUB_ENV
            echo "IS_RELEASE=false" >> $GITHUB_ENV
          else
            echo "SLOT=preview" >> $GITHUB_ENV
            echo "IS_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Build XML docs
        run: |
          dotnet build src/BaseDDD.Cli/BaseDDD.Cli.csproj \
            -c Release /p:GenerateDocumentationFile=true

      - name: Build DocFX site
        run: docfx docs/docfx.json

      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages; then
            git checkout --orphan gh-pages
            git rm -rf . --quiet
            touch .nojekyll
            git add .nojekyll
            git commit -m "chore: init gh-pages"
            git push origin gh-pages
            git checkout -
          fi

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy slot
        run: |
          SLOT="${{ env.SLOT }}"
          DEST="gh-pages/$SLOT"

          # Always ensure .nojekyll exists (fixes Jekyll build errors)
          touch gh-pages/.nojekyll

          if [[ "${{ env.IS_RELEASE }}" == "true" && -d "$DEST" ]]; then
            echo "Release docs for $SLOT already exist — skipping."
            exit 0
          fi

          rm -rf "$DEST"
          mkdir -p "$DEST"
          cp -r docs/_site/. "$DEST/"

      - name: Update versions manifest
        if: env.IS_RELEASE == 'true'
        run: |
          MANIFEST="gh-pages/versions.json"
          SLOT="${{ env.SLOT }}"
          node -e "
            const fs = require('fs');
            let versions = [];
            try { versions = JSON.parse(fs.readFileSync('$MANIFEST', 'utf8')); } catch {}
            if (!versions.includes('$SLOT')) versions.unshift('$SLOT');
            fs.writeFileSync('$MANIFEST', JSON.stringify(versions, null, 2));
          "

      - name: Commit and push gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "docs: deploy ${{ env.SLOT }}"
          git push origin gh-pages
